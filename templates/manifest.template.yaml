# Claude Config Manifest Template
# Copy this file to your private config repo and customize

version: 1
metadata:
  name: my-claude-config
  description: 个人 Claude Code 配置清单
  last_updated: "YYYY-MM-DD"
  last_sync_platform: ""
  # 配置仓库地址（让 agent 记住）
  config_repo:
    local: ~/claude-config-data           # 本地路径
    remote: ""                             # 远程仓库，如 github:username/repo

# 平台定义
platforms:
  mac: [darwin, macos]
  windows: [windows, win32, win64]
  linux: [linux, ubuntu, debian]

# Skills 配置
# 支持三种上游类型：
# - self: 本仓库内的自制 skill
# - self (with repo): 有独立仓库的自制 skill
# - third-party: 第三方社区 skill

skills:
  # 示例：本仓库内的自制 skill
  # my-skill:
  #   source: assets/skills/my-skill
  #   platforms: [all]
  #   upstream:
  #     type: self
  #   description: 我的自制 skill

  # 示例：有独立仓库的自制 skill
  # my-shared-skill:
  #   source: assets/skills/my-shared-skill
  #   platforms: [all]
  #   upstream:
  #     type: self
  #     repo: github:user/my-shared-skill
  #     ref: main
  #     last_sync: "YYYY-MM-DD"

  # 示例：第三方 skill
  # third-party-skill:
  #   source: assets/skills/third-party-skill
  #   platforms: [all]
  #   upstream:
  #     type: third-party
  #     repo: github:xxx/repo
  #     ref: main
  #     last_sync: "YYYY-MM-DD"

skills: {}

# Rules 配置
rules: {}

# Agents 配置
agents: {}

# Settings 配置
settings:
  base:
    source: assets/settings/base.json
    merge_strategy: replace
    platforms: [all]

# Permissions（平台分类）
permissions:
  universal:
    source: assets/settings/permissions-universal.json
    merge_strategy:
      path: permissions.allow
      mode: merge_unique
    platforms: [all]

  mac:
    source: assets/settings/permissions-mac.json
    merge_strategy:
      path: permissions.allow
      mode: merge_unique
    platforms: [mac]

  windows:
    source: assets/settings/permissions-windows.json
    merge_strategy:
      path: permissions.allow
      mode: merge_unique
    platforms: [windows]

# Hooks 配置
# Example:
# hooks:
#   statusline:
#     depends_on: [claude-hud]
#     mac:
#       source: assets/hooks/mac/statusline.sh
#       target: ~/.claude/statusline.sh
#       runtime: bash
#     windows:
#       source: assets/hooks/windows/statusline.ps1
#       target: ~/.claude/statusline.ps1
#       runtime: powershell
hooks: {}

# CLAUDE.md（用户级指令）
# claude_md:
#   source: assets/claude-md/CLAUDE.md
#   target: ~/.claude/CLAUDE.md
#   platforms: [all]

# Memory
# memory:
#   items:
#     my-workflow:
#       source: assets/memory/my-workflow.md
#       platforms: [all]

# 环境变量
env:
  expected:
    - ANTHROPIC_AUTH_TOKEN
    - ANTHROPIC_BASE_URL
  fixed: {}
    # CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    # ENABLE_TOOL_SEARCH: "true"

# 排除列表
exclude:
  - ~/.claude/config.json
  - ~/.claude.json
  - ~/.claude/teams/
  - ~/.claude/session-env/
  - ~/.claude/sessions/
  - ~/.claude/history.jsonl
  - ~/.claude/cache/
  - ~/.claude/telemetry/